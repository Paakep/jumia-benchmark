services:
  - type: web
    name: jumia-benchmark
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RENDER
        value: true
      - key: APP_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
